<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Game - Succès</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="layout">
        <main class="main">
           <div class="sticky-controls">
                <div class="global-progress">
                    <button class="progress-btn" id="open-progress">
                        <svg xmlns="http://www.w3.org/2000/svg" height="18px" viewBox="0 -960 960 960" width="18px" fill="currentColor"><path d="M536.5-543.5Q560-567 560-600t-23.5-56.5Q513-680 480-680t-56.5 23.5Q400-633 400-600t23.5 56.5Q447-520 480-520t56.5-23.5ZM440-200v-124q-49-11-87.5-41.5T296-442q-75-9-125.5-65.5T120-640v-40q0-33 23.5-56.5T200-760h80q0-33 23.5-56.5T360-840h240q33 0 56.5 23.5T680-760h80q33 0 56.5 23.5T840-680v40q0 76-50.5 132.5T664-442q-18 46-56.5 76.5T520-324v124h120q17 0 28.5 11.5T680-160q0 17-11.5 28.5T640-120H320q-17 0-28.5-11.5T280-160q0-17 11.5-28.5T320-200h120ZM280-528v-152h-80v40q0 38 22 68.5t58 43.5Zm285 93q35-35 35-85v-240H360v240q0 50 35 85t85 35q50 0 85-35Zm115-93q36-13 58-43.5t22-68.5v-40h-80v152Zm-200-52Z"/></svg>
                        <span class="progress-btn-label">Objectifs</span>
                    </button>
                    <div class="progress-center">
                        <div class="global-progress-track">
                            <div class="global-progress-fill" id="progress-bar"></div>
                        </div>
                    </div>
                    <div class="progress-stats">
                        <span id="unlocked-count">0</span><span class="progress-stats-sep">/</span><span id="total-count">0</span>
                        <span id="progress-pct" class="progress-pct-badge">0%</span>
                    </div>
                </div>
                <div class="sort-bar">
                    <span class="sort-label">Trier</span>
                    <button class="sort-btn active" data-sort="number"># Numéro</button>
                    <button class="sort-btn" data-sort="alpha">A–Z</button>
                    <button class="sort-btn" data-sort="validated">✓ Validés</button>
                </div>
            </div>

            <div id="grid" class="grid"></div>
        </main>

        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <button class="sidebar-back" id="sidebar-back">
                    <svg xmlns="http://www.w3.org/2000/svg" height="22px" viewBox="0 -960 960 960" width="22px" fill="currentColor"><path d="M560-240 320-480l240-240 56 56-184 184 184 184-56 56Z"/></svg>
                    Retour
                </button>
                <span class="sidebar-header-title">Objectifs</span>
            </div>
            <div class="sidebar-inner">
                <h2>Objectifs</h2>
                <div class="sidebar-progress">
                    <div class="sidebar-progress-track">
                        <div class="sidebar-progress-fill" id="sidebar-bar"></div>
                    </div>
                    <p class="sidebar-progress-text"><span id="sidebar-count">0</span> / <span id="sidebar-total">0</span></p>
                </div>
                <div id="milestones" class="milestones"></div>
            </div>
        </aside>
    </div>

    <!-- Modal Mot de passe -->
    <div id="modal-password" class="modal hidden">
        <div class="modal-overlay"></div>
        <div class="modal-content modal-password-theme">
            <button class="modal-close modal-close-btn">&times;</button>
            <div class="modal-icon-row">
                <img class="modal-icon" src="" alt="">
                <div class="modal-info">
                    <span class="modal-badge">#<span class="modal-number"></span></span>
                    <h2 class="modal-title"></h2>
                </div>
            </div>
            <div class="modal-separator"></div>
            <div class="modal-body">
                <div class="lock-row">&#128274; Entrez le mot de passe pour accéder au défi</div>
                <div class="input-group">
                    <input type="text" id="password-input" maxlength="3" autocomplete="off" placeholder="•••">
                    <button id="password-submit">Déverrouiller</button>
                </div>
                <p id="password-error" class="error hidden">Mot de passe incorrect.</p>
            </div>
        </div>
    </div>

    <!-- Modal Question -->
    <div id="modal-question" class="modal hidden">
        <div class="modal-overlay"></div>
        <div class="modal-content modal-question-theme">
            <div class="modal-bg" id="question-bg"></div>
            <button class="modal-close modal-close-btn">&times;</button>
            <div class="modal-icon-row">
                <img class="modal-icon" src="" alt="">
                <div class="modal-info">
                    <span class="modal-badge badge-question">Défi #<span class="modal-number"></span></span>
                    <h2 class="modal-title"></h2>
                </div>
            </div>
            <div class="modal-separator sep-gold"></div>
            <div class="modal-body">
                <p id="question-text" class="question"></p>
                <div class="input-group">
                    <input type="text" id="answer-input" autocomplete="off" placeholder="Votre réponse…">
                    <button id="answer-submit" class="btn-question">Valider</button>
                </div>
                <p id="answer-error" class="error hidden">Mauvaise réponse, réessayez.</p>
            </div>
        </div>
    </div>


    <!-- Modal Déjà validé -->
    <div id="modal-done" class="modal hidden">
        <div class="modal-overlay"></div>
        <div class="modal-content modal-done-theme">
            <button class="modal-close modal-close-btn">&times;</button>
            <div class="modal-icon-row">
                <img class="modal-icon unlocked-icon" src="" alt="">
                <div class="modal-info">
                    <span class="modal-badge badge-done">#<span class="modal-number"></span></span>
                    <h2 class="modal-title"></h2>
                </div>
            </div>
            <div class="modal-separator sep-green"></div>
            <div class="modal-body" style="text-align:center">
                <div class="done-icon">&#10003;</div>
                <p class="success-msg">Succès validé !</p>
            </div>
        </div>
    </div>

    <!-- Firebase SDK EN PREMIER -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
    <!-- Ton script APRÈS -->
    <script src="script.js" charset="UTF-8"></script>
</body>
</html>

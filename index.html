<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Game - Succès</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="layout">
        <main class="main">
           <div class="sticky-controls">
                <div class="progress-panel">
                    <div class="progress-panel-header">
                        <div class="progress-panel-title">
                            <svg xmlns="http://www.w3.org/2000/svg" height="14px" viewBox="0 -960 960 960" width="14px" fill="currentColor"><path d="M536.5-543.5Q560-567 560-600t-23.5-56.5Q513-680 480-680t-56.5 23.5Q400-633 400-600t23.5 56.5Q447-520 480-520t56.5-23.5ZM440-200v-124q-49-11-87.5-41.5T296-442q-75-9-125.5-65.5T120-640v-40q0-33 23.5-56.5T200-760h80q0-33 23.5-56.5T360-840h240q33 0 56.5 23.5T680-760h80q33 0 56.5 23.5T840-680v40q0 76-50.5 132.5T664-442q-18 46-56.5 76.5T520-324v124h120q17 0 28.5 11.5T680-160q0 17-11.5 28.5T640-120H320q-17 0-28.5-11.5T280-160q0-17 11.5-28.5T320-200h120ZM280-528v-152h-80v40q0 38 22 68.5t58 43.5Zm285 93q35-35 35-85v-240H360v240q0 50 35 85t85 35q50 0 85-35Zm115-93q36-13 58-43.5t22-68.5v-40h-80v152Zm-200-52Z"/></svg>
                            SUCCÈS
                            <span id="firebase-badge" class="firebase-badge" title="Firebase : connexion en cours..."></span>
                        </div>
                        <button class="progress-panel-btn" id="open-progress">
                            <svg xmlns="http://www.w3.org/2000/svg" height="15px" viewBox="0 -960 960 960" width="15px" fill="currentColor"><path d="M200-120q-33 0-56.5-23.5T120-200v-560q0-33 23.5-56.5T200-840h168q13-36 43.5-58t68.5-22q38 0 68.5 22t43.5 58h168q33 0 56.5 23.5T840-760v560q0 33-23.5 56.5T760-120H200Zm0-80h560v-560H200v560Zm80-80h400v-80H280v80Zm0-160h400v-80H280v80Zm0-160h400v-80H280v80Zm200-165q14 0 24.5-10.5T515-800q0-14-10.5-24.5T480-835q-14 0-24.5 10.5T445-800q0 14 10.5 24.5T480-765ZM200-200v-560 560Z"/></svg>
                            <span class="progress-panel-btn-label">Objectifs</span>
                        </button>
                    </div>
                    <div class="progress-panel-body">
                        <div class="progress-stat">
                            <span class="progress-stat-value" id="unlocked-count">0</span>
                            <span class="progress-stat-label">/ <span id="total-count">0</span> validés</span>
                        </div>
                        <div class="progress-bar-wrap">
                            <div class="global-progress-track">
                                <div class="global-progress-fill" id="progress-bar"></div>
                            </div>
                        </div>
                        <div class="progress-stat">
                            <span class="progress-stat-value" id="progress-pct">0%</span>
                            <span class="progress-stat-label">complété</span>
                        </div>
                    </div>
                </div>
                <div class="sort-bar">
                    <div class="sort-bar-group">
                        <span class="sort-label">Trier</span>
                        <button class="sort-btn active" data-sort="number">Numéro</button>
                        <button class="sort-btn" data-sort="alpha">A–Z</button>
                        <button class="sort-btn" data-sort="validated">Validés</button>
                    </div>
                    <div class="sort-bar-group">
                        <div class="zoom-controls">
                            <span class="sort-label">Grille</span>
                            <button class="zoom-btn" id="zoom-out" title="Moins de colonnes">−</button>
                            <span class="zoom-label" id="zoom-label">4</span>
                            <button class="zoom-btn" id="zoom-in" title="Plus de colonnes">+</button>
                            <button class="zoom-toggle-btn" id="zoom-toggle" title="Changer la grille">
                                <svg xmlns="http://www.w3.org/2000/svg" height="13px" viewBox="0 -960 960 960" width="13px" fill="currentColor"><path d="M120-520v-320h320v320H120Zm0 400v-320h320v320H120Zm400-400v-320h320v320H520Zm0 400v-320h320v320H520ZM200-600h160v-160H200v160Zm400 0h160v-160H600v160Zm0 400h160v-160H600v160Zm-400 0h160v-160H200v160Z"/></svg>
                                <span id="zoom-toggle-label">2</span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <div id="grid" class="grid"></div>
        </main>

        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <button class="sidebar-back" id="sidebar-back">
                    <svg xmlns="http://www.w3.org/2000/svg" height="22px" viewBox="0 -960 960 960" width="22px" fill="currentColor"><path d="M560-240 320-480l240-240 56 56-184 184 184 184-56 56Z"/></svg>
                    Retour
                </button>
            </div>
            <div class="sidebar-inner">
                <div class="sidebar-panel-header">
                    <div class="sidebar-panel-title">
                        <svg xmlns="http://www.w3.org/2000/svg" height="14px" viewBox="0 -960 960 960" width="14px" fill="currentColor"><path d="M536.5-543.5Q560-567 560-600t-23.5-56.5Q513-680 480-680t-56.5 23.5Q400-633 400-600t23.5 56.5Q447-520 480-520t56.5-23.5ZM440-200v-124q-49-11-87.5-41.5T296-442q-75-9-125.5-65.5T120-640v-40q0-33 23.5-56.5T200-760h80q0-33 23.5-56.5T360-840h240q33 0 56.5 23.5T680-760h80q33 0 56.5 23.5T840-680v40q0 76-50.5 132.5T664-442q-18 46-56.5 76.5T520-324v124h120q17 0 28.5 11.5T680-160q0 17-11.5 28.5T640-120H320q-17 0-28.5-11.5T280-160q0-17 11.5-28.5T320-200h120ZM280-528v-152h-80v40q0 38 22 68.5t58 43.5Zm285 93q35-35 35-85v-240H360v240q0 50 35 85t85 35q50 0 85-35Zm115-93q36-13 58-43.5t22-68.5v-40h-80v152Zm-200-52Z"/></svg>
                        OBJECTIFS
                    </div>
                </div>
                <div class="sidebar-panel-body">
                    <div class="progress-stat">
                        <span class="progress-stat-value" id="sidebar-count">0</span>
                        <span class="progress-stat-label">/ <span id="sidebar-total">0</span> validés</span>
                    </div>
                    <div class="progress-bar-wrap">
                        <div class="sidebar-progress-track">
                            <div class="sidebar-progress-fill" id="sidebar-bar"></div>
                        </div>
                    </div>
                    <div class="progress-stat">
                        <span class="progress-stat-value" id="sidebar-pct">0%</span>
                        <span class="progress-stat-label">complété</span>
                    </div>
                </div>
                <div class="sidebar-next-milestone" id="sidebar-next-milestone">
                    <div class="sidebar-next-label">
                        <svg xmlns="http://www.w3.org/2000/svg" height="12px" viewBox="0 -960 960 960" width="12px" fill="currentColor"><path d="m354-247 126-76 126 77-33-144 111-96-146-13-58-136-58 135-146 13 111 97-33 143Zm-68 167 65-281L120-539l288-25 112-265 112 265 288 25-231 198 65 281-234-141-234 141Zm234-380Z"/></svg>
                        PROCHAIN PALIER
                    </div>
                    <span class="sidebar-next-count" id="sidebar-next-count">—</span>
                    <p class="sidebar-next-reward" id="sidebar-next-reward">—</p>
                    <span class="sidebar-next-progress" id="sidebar-next-progress">0 / 0</span>
                </div>
                <div class="sidebar-milestones-label">PALIERS</div>
                <div id="milestones" class="milestones"></div>
                <div class="sidebar-reset-wrap">
                    <button id="sidebar-reset" class="sidebar-reset-btn">
                        <svg xmlns="http://www.w3.org/2000/svg" height="14px" viewBox="0 -960 960 960" width="14px" fill="currentColor"><path d="M280-120q-33 0-56.5-23.5T200-200v-520h-40v-80h200v-40h240v40h200v80h-40v520q0 33-23.5 56.5T680-120H280Zm400-600H280v520h400v-520ZM360-280h80v-360h-80v360Zm160 0h80v-360h-80v360ZM280-720v520-520Z"/></svg>
                        Réinitialiser les sauvegardes
                    </button>
                </div>
            </div>
        </aside>
    </div>

    <!-- Modal Info Film -->
    <div id="modal-info" class="modal hidden">
        <div class="modal-overlay"></div>
        <div class="modal-content modal-info-theme">
            <div id="info-bg"></div>
            <button class="modal-close modal-close-btn">&times;</button>
            <div class="modal-icon-row">
                <img class="modal-icon unlocked-icon" id="info-icon" src="" alt="">
                <div class="modal-info">
                    <span class="modal-badge badge-info">#<span id="info-num"></span></span>
                    <h2 class="modal-title" id="info-title"></h2>
                </div>
            </div>
            <div class="modal-separator"></div>
            <div class="modal-body info-body">
                <div class="info-director-row" id="info-director-row">
                    <svg xmlns="http://www.w3.org/2000/svg" height="14px" viewBox="0 -960 960 960" width="14px" fill="currentColor"><path d="m260-260 300-140 140-300-300 140-140 300Zm220-180q-17 0-28.5-11.5T440-480q0-17 11.5-28.5T480-520q17 0 28.5 11.5T520-480q0 17-11.5 28.5T480-440Zm0 360q-83 0-156-31.5T197-197q-54-54-85.5-127T80-480q0-83 31.5-156T197-763q54-54 127-85.5T480-880q83 0 156 31.5T763-763q54 54 85.5 127T880-480q0 83-31.5 156T763-197q-54 54-127 85.5T480-80Zm0-80q134 0 227-93t93-227q0-134-93-227t-227-93q-134 0-227 93t-93 227q0 134 93 227t227 93Zm0-320Z"/></svg>
                    <span id="info-director"></span>
                </div>
                <p class="info-desc" id="info-desc"></p>
                <a class="info-trailer-btn" id="info-trailer" href="#" target="_blank" rel="noopener noreferrer">
                    <svg xmlns="http://www.w3.org/2000/svg" height="18px" viewBox="0 0 24 24" width="18px" fill="white"><path d="M19.615 3.184c-3.604-.246-11.631-.245-15.23 0-3.897.266-4.356 2.62-4.385 8.816.029 6.185.484 8.549 4.385 8.816 3.6.245 11.626.246 15.23 0 3.897-.266 4.356-2.62 4.385-8.816-.029-6.185-.484-8.549-4.385-8.816zm-10.615 12.816v-8l8 3.993-8 4.007z"/></svg>
                    Voir la bande annonce
                </a>
            </div>
            <div class="info-footer">
                <button id="info-cta" class="info-cta-btn"></button>
            </div>
        </div>
    </div>

    <!-- Modal Mot de passe -->
    <div id="modal-password" class="modal hidden">
        <div class="modal-overlay"></div>
        <div class="modal-content modal-password-theme">
            <button class="modal-close modal-close-btn">&times;</button>
            <div class="modal-icon-row">
                <img class="modal-icon" src="" alt="">
                <div class="modal-info">
                    <span class="modal-badge">#<span class="modal-number"></span></span>
                    <h2 class="modal-title"></h2>
                </div>
            </div>
            <div class="modal-separator"></div>
            <div class="modal-body">
                <div class="lock-row">&#128274; Entrez le mot de passe pour accéder au défi</div>
                <div class="input-group">
                    <input type="text" id="password-input" maxlength="3" autocomplete="off" placeholder="•••">
                    <button id="password-submit">Déverrouiller</button>
                </div>
                <p id="password-error" class="error hidden">Mot de passe incorrect.</p>
            </div>
        </div>
    </div>

    <!-- Modal Question -->
    <div id="modal-question" class="modal hidden">
        <div class="modal-overlay"></div>
        <div class="modal-content modal-question-theme">
            <div class="modal-bg" id="question-bg"></div>
            <button class="modal-close modal-close-btn">&times;</button>
            <div class="modal-icon-row">
                <img class="modal-icon" src="" alt="">
                <div class="modal-info">
                    <span class="modal-badge badge-question">Défi #<span class="modal-number"></span></span>
                    <h2 class="modal-title"></h2>
                </div>
            </div>
            <div class="modal-separator sep-gold"></div>
            <div class="modal-body">
                <p id="question-text" class="question"></p>
                <div class="input-group">
                    <input type="text" id="answer-input" autocomplete="off" placeholder="Votre réponse…">
                    <button id="answer-submit" class="btn-question">Valider</button>
                </div>
                <p id="answer-error" class="error hidden">Mauvaise réponse, réessayez.</p>
            </div>
        </div>
    </div>


    <!-- Modal Déjà validé -->
    <div id="modal-done" class="modal hidden">
        <div class="modal-overlay"></div>
        <div class="modal-content modal-done-theme">
            <button class="modal-close modal-close-btn">&times;</button>
            <div class="modal-icon-row">
                <img class="modal-icon unlocked-icon" src="" alt="">
                <div class="modal-info">
                    <span class="modal-badge badge-done">#<span class="modal-number"></span></span>
                    <h2 class="modal-title"></h2>
                </div>
            </div>
            <div class="modal-separator sep-green"></div>
            <div class="modal-body" style="text-align:center">
                <div class="done-icon">&#10003;</div>
                <p class="success-msg">Succès validé !</p>
            </div>
        </div>
    </div>

    <!-- Firebase SDK EN PREMIER -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
    <!-- Ton script APRÈS -->
    <script src="script.js" charset="UTF-8"></script>

    <!-- Toast notifications -->
    <div id="toast-container"></div>

    <!-- Splash Screen -->
    <div id="splash">
        <div class="splash-spinner"></div>
    </div>
</body>
</html>
